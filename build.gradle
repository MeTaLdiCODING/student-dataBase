plugins {
    id 'java'
    id 'application'
}

group = 'ru.dataBase'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.44'
    annotationProcessor 'org.projectlombok:lombok:1.18.44'
}

application {
    mainClass = 'ru.dataBase.student.Main'
}